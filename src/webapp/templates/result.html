<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Detection Result</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      background: url("{{ url_for('static', filename='sugarcane2.jpeg') }}") no-repeat center center fixed;
      background-size: cover;
      margin: 0;
      font-family: "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: #222;
    }

    /* White box for disease name + image + confidence */
    .disease-box {
      background-color: #ffffff;
      border-radius: 12px;
      padding: 25px 35px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
      text-align: center;
      width: 400px;
    }

    .confidence-box {
      background-color: #ffffff;
      border-radius: 10px;
      padding: 10px 18px;
      display: inline-block;
      margin-top: 10px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
      font-weight: bold;
      color: #2e7d32;
    }
  </style>
</head>
<body>
  <header class="nav">
    <div class="nav-left">Crop Checkup</div>
    <nav>
      <a href="/">Home</a>
      <a href="/#predict">Prediction</a>
      <a href="#">About</a>
      <a href="#">Services</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <main class="result-page">
    <div class="result-grid">

      <!-- ✅ White box for disease name, image, and confidence -->
      <div class="disease-box">
        <h1 style="color: #c0392b;">{{ disease }} Detected</h1>
        <img src="{{ image_url }}" alt="uploaded image" class="result-image" style="width: 300px; border-radius: 10px; margin-bottom: 10px;" />
        <p class="confidence-box">Confidence: {{ confidence }}%</p>
      </div>

      <!-- Remedies section remains unchanged -->
      <section class="disease-classification" 
         style="background-color: #ffffff; 
                border-radius: 12px; 
                padding: 25px 35px; 
                box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15); 
                width: 450px; 
                backdrop-filter: blur(2px); 
                margin-top: 20px;">
        <h2 style="color: #13421a; font-size: 22px; margin-bottom: 15px;">
          Recommended Remedies:
        </h2>

      <div style="color: #222; font-size: 17px; line-height: 1.6; margin-bottom: 20px;">
        {{ remedy | safe }}
      </div>

        <a class="btn" href="/" 
           style="background: #2e7d32; 
                  color: #fff; 
                  padding: 10px 18px; 
                  border-radius: 8px; 
                  text-decoration: none; 
                  font-weight: 600;">
          ← Back to Upload
        </a>
      </section>

    </div>
  </main>
</body>
</html>
